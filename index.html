<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greek Island Itinerary</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --accent-blue: #00d2ff;
            --accent-green: #39ff14;
            --accent-amber: #ffb300;
            --btn-bg: rgba(30, 30, 30, 0.6);
            --btn-hover: rgba(50, 50, 50, 0.8);
            --glass-bg: rgba(20, 20, 20, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --border-radius: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(rgba(10, 10, 10, 0.4), rgba(10, 10, 10, 0.7)), url('https://dogierez.github.io/greek-islands/home.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: var(--text-color);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
            transition: background-image 0.5s ease-in-out;
        }

        #preload-bg { display: none; }

        main {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 40px;
        }

        header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
            margin: 0 auto 40px auto;
        }

        h1 {
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            color: var(--text-color);
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            color: var(--accent-blue);
        }

        h3 {
            color: var(--accent-amber);
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 5px;
        }

        #language-selector {
            display: flex;
            gap: 10px;
            background: var(--glass-bg);
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .lang-btn {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            color: #000;
            background-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.4);
        }

        .island-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .island-options button {
            padding: 40px 10px; 
            font-size: 1.5rem; 
            font-weight: 800;
            color: #ffffff; 
            border-radius: 20px; 
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
            letter-spacing: 1px;
            cursor: pointer;
        }
        
        .island-options button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.6);
            filter: brightness(1.2);
        }
        
        #btn-chios { background: #304D63; }
        #btn-kos { background: #43634B; }
        #btn-lesbos { background: #9B870C; }
        #btn-meis { background: #800080; } 
        #btn-rhodes { background: #800000; } 
        #btn-samos { background: #CC5500; } 

        .map-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 0 auto 30px auto;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .map-pin {
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .map-pin:hover {
            transform: scale(1.1);
        }

        .map-pin circle {
            fill: var(--glass-bg);
            stroke: var(--accent-amber);
            stroke-width: 3;
            transition: all 0.3s ease;
        }

        .map-pin:hover circle {
            fill: var(--accent-amber);
            stroke: #fff;
        }

        .map-pin text {
            fill: #fff;
            font-weight: bold;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        section {
            position: relative;
        }

        .back-btn-top {
            position: absolute;
            top: -5px;
            right: 0px;
            background-color: var(--accent-amber);
            color: #000;
            border: none;
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 179, 0, 0.5);
            text-transform: uppercase;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .back-btn-top:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(255, 179, 0, 0.7);
            background-color: #ffcc00;
        }

        .hidden { display: none !important; }

        .day-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius);
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .day-image {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .day-image-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(10,10,10,0.9));
            padding: 20px;
        }

        .day-header {
            font-size: 1.5rem;
            color: var(--accent-green);
            font-weight: 800;
        }

        .day-title {
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .day-content {
            padding: 20px;
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s ease;
        }

        .task-item:hover { background: rgba(255,255,255,0.05); }

        .task-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-top: 2px;
            cursor: pointer;
            accent-color: var(--accent-blue);
            flex-shrink: 0;
        }

        .task-text { transition: all 0.2s ease; }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .dinner-toggle-container {
            margin-top: 20px;
            background: rgba(0,0,0,0.4);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .dinner-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .dinner-buttons button {
            flex: 1;
            padding: 10px;
            background: var(--glass-bg);
            color: #fff;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .dinner-buttons button:hover {
            background: rgba(255, 179, 0, 0.2);
        }

        .dinner-buttons button.active {
            background: var(--accent-amber);
            color: #000;
            border-color: var(--accent-amber);
        }

        .restaurant-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-amber);
        }

        .rest-name { font-weight: bold; font-size: 1.2rem; color: var(--accent-blue); }
        .rest-name a { color: var(--accent-blue); text-decoration: underline; transition: color 0.2s; }
        .rest-name a:hover { color: var(--accent-green); }
        .rest-desc { color: var(--text-muted); margin-top: 5px; }

    </style>
</head>

            <button onclick="changeLanguage('DE')" class="lang-btn" id="btn-lang-de">🇩🇪 DE</button>

            <button onclick="changeLanguage('TR')" class="lang-btn" id="btn-lang-tr">🇹🇷 TR</button>
        </div>
    </header>

    <main>

                <button id="btn-lesbos" onclick="selectIsland('lesbos')">🇬🇷 Lesbos</button>
                <button id="btn-meis" onclick="selectIsland('meis')">🇬🇷 Meis</button>
                <button id="btn-rhodes" onclick="selectIsland('rhodes')">🇬🇷 Rhodes</button>
                <button id="btn-samos" onclick="selectIsland('samos')">🇬🇷 Samos</button>
            </div>
        </section>

        <!-- Level 2: Choose Base Location -->
        <section id="setup-screen" class="hidden">
            <button onclick="goBack('island-screen')" class="back-btn-top" id="btn-back">Back to Islands</button>
            <h2 id="setup-title" class="island-name-display" style="margin-right: 90px; text-align: left;">Select Your Base Location</h2>

                    <g class="map-pin" onclick="startApp('north')">
                        <circle cx="150" cy="80" r="18"/>
                        <text x="150" y="85" text-anchor="middle" id="map-lbl-north">North</text>
                    </g>
                    <g class="map-pin" onclick="startApp('west')">
                        <circle cx="80" cy="220" r="18"/>
                        <text x="80" y="225" text-anchor="middle" id="map-lbl-west">West</text>
                    </g>
                    <g class="map-pin" onclick="startApp('center')">
                        <circle cx="210" cy="200" r="18"/>
                        <text x="210" y="205" text-anchor="middle" id="map-lbl-center">Center</text>
                    </g>
                    <g class="map-pin" onclick="startApp('east')">

                    </g>
                    <g class="map-pin" onclick="startApp('south')">
                        <circle cx="150" cy="360" r="18"/>
                        <text x="150" y="365" text-anchor="middle" id="map-lbl-south">South</text>
                    </g>
                </svg>
            </div>
        </section>

        <!-- Level 3: The Itinerary -->
        <section id="itinerary-container" class="hidden">
            <div style="position: relative; margin-bottom: 40px; height: 30px;">
                <button onclick="goBack('setup-screen')" class="back-btn-top" id="btn-back-base">Back to Bases</button>
            </div>
            <div id="days-wrapper"></div>
        </section>

    </main>

        // --- JavaScript Logic ---

        function hideAll() {
            document.getElementById('island-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('itinerary-container').classList.add('hidden');
        }

        function goBack(targetId) {
            hideAll();
            document.getElementById(targetId).classList.remove('hidden');
            taskHistoryStack = []; 
            if(targetId === 'island-screen') {
                document.body.style.backgroundImage = `linear-gradient(rgba(10, 10, 10, 0.4), rgba(10, 10, 10, 0.7)), url('${islandImages['home']}')`;
            }
        }

        function selectIsland(island) {
            selectedIsland = island;
            document.body.style.backgroundImage = `linear-gradient(rgba(10, 10, 10, 0.4), rgba(10, 10, 10, 0.7)), url('${islandImages[island]}')`;
            hideAll();
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        function startApp(baseLocation) {
            currentBaseLocation = baseLocation;
            hideAll();
            document.getElementById('itinerary-container').classList.remove('hidden');
            renderItinerary();
        }

        function renderItinerary() {
            const wrapper = document.getElementById('days-wrapper');
            wrapper.innerHTML = ''; 

            const data = allModules[currentLang][selectedIsland];
            if(!data) {
                wrapper.innerHTML = `<h2 style="color:white;text-align:center;">Error Loading Island Data</h2>`;
                return;
            }
            
            const middleModules = [data.south, data.west, data.north, data.northeast, data.east];

            let startIndex = 0;
            if (currentBaseLocation === 'south') startIndex = 0;
            else if (currentBaseLocation === 'west') startIndex = 1;
            else if (currentBaseLocation === 'north') startIndex = 2;
            else if (currentBaseLocation === 'east') startIndex = 3; 
            else if (currentBaseLocation === 'center') startIndex = 4;

            let rotatedMiddle = [];
            for (let i = 0; i < 5; i++) {
                let pointer = (startIndex + i) % 5;
                rotatedMiddle.push(middleModules[pointer]);
            }

            let finalItinerary = [data.arrival, ...rotatedMiddle, data.departure];

            finalItinerary.forEach((day, index) => {
                let dayNum = index + 1;
                let imageUrl = moduleImages[day.id];
                
                let tasksHTML = '';
                const periods = [
                    { title: i18n[currentLang].morning, items: day.morning },
                    { title: i18n[currentLang].afternoon, items: day.afternoon },
                    { title: i18n[currentLang].evening, items: day.evening },
                    { title: i18n[currentLang].night, items: day.night }
                ];

                periods.forEach((p, periodIndex) => {
                    tasksHTML += `<h3>${p.title}</h3><ul class="task-list">`;
                    p.items.forEach((task, taskIndex) => {
                        let taskText = task;
                        if (day.id === 'arrival' && taskText.includes('{beach}')) {
                            taskText = taskText.replace('{beach}', nearestBeaches[selectedIsland][currentBaseLocation]);
                        }

                        let taskId = `task-${selectedIsland}-${day.id}-${periodIndex}-${taskIndex}`;
                        let isChecked = completedTasks.has(taskId) ? 'checked' : '';
                        let completedClass = completedTasks.has(taskId) ? 'completed' : '';

                        tasksHTML += `
                            <li class="task-item ${completedClass}" id="${taskId}" onclick="toggleTask('${taskId}')">
                                <input type="checkbox" id="check-${taskId}" ${isChecked}>
                                <span class="task-text">${taskText}</span>
                            </li>
                        `;
                    });
                    tasksHTML += `</ul>`;
                });

                let dinnerId = `dinner-${selectedIsland}-${day.id}`;
                
                // Determine which region's dinner to show. 
                // Day 1 (index 0) dynamically uses the user's chosen base location.
                let dinnerSourceId = day.id;
                if (index === 0) {
                    dinnerSourceId = currentBaseLocation === 'center' ? 'arrival' : currentBaseLocation;
                }
                
                let dinnerHTML = `
                    <div class="dinner-toggle-container">
                        <h3 style="margin-top: 0; border: none; color: #fff;">${i18n[currentLang].dinnerSuggest}</h3>
                        <div class="dinner-buttons">
                            <button onclick="showDinner(event, '${dinnerId}', 'seafood', '${dinnerSourceId}')">${i18n[currentLang].seafood}</button>
                            <button onclick="showDinner(event, '${dinnerId}', 'meat', '${dinnerSourceId}')">${i18n[currentLang].meat}</button>
                            <button onclick="showDinner(event, '${dinnerId}', 'snacks', '${dinnerSourceId}')">${i18n[currentLang].snacks}</button>
                        </div>
                        <div id="${dinnerId}-display" class="restaurant-card hidden"></div>
                    </div>
                `;

                let cardHTML = `
                    <div class="day-card">
                        <div class="day-image" style="background-image: url('${imageUrl}');">
                            <div class="day-image-overlay">
                                <div class="day-header">${i18n[currentLang].day} ${dayNum}</div>
                                <div class="day-title">${day.title}</div>
                            </div>
                        </div>
                        <div class="day-content">
                            ${tasksHTML}
                            ${dinnerHTML}
                        </div>
                    </div>
                `;
                
                wrapper.innerHTML += cardHTML;
            });
        }

        function toggleTask(taskId) {
            const li = document.getElementById(taskId);
            const checkbox = document.getElementById(`check-${taskId}`);
            
            if (li.classList.contains('completed')) {
                li.classList.remove('completed');
                checkbox.checked = false;
                completedTasks.delete(taskId);
                taskHistoryStack = taskHistoryStack.filter(id => id !== taskId);
            } else {
                li.classList.add('completed');
                checkbox.checked = true;
                completedTasks.add(taskId);
                taskHistoryStack.push(taskId);
            }
        }

        document.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowDown') {
                e.preventDefault(); 
                if(taskHistoryStack.length > 0) {
                    let lastTaskId = taskHistoryStack.pop();
                    const li = document.getElementById(lastTaskId);
                    const checkbox = document.getElementById(`check-${lastTaskId}`);
                    if(li && checkbox) {
                        li.classList.remove('completed');
                        checkbox.checked = false;
                        completedTasks.delete(lastTaskId);
                    } else {
                        completedTasks.delete(lastTaskId);
                    }
                }
            }
        });

        function showDinner(event, displayId, type, dayId) {
            const displayDiv = document.getElementById(`${displayId}-display`);
            const parentBtns = event.target.parentElement.querySelectorAll('button');
            parentBtns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            const dayData = allModules[currentLang][selectedIsland][dayId];
            const restData = dayData.dinner[type];

            // 1. Extract the raw restaurant name (strips out the broken dummy <a> links)
            let cleanName = restData.name;
            const extractRegex = /<a[^>]*>(.*?)<\/a>/;
            if (extractRegex.test(cleanName)) {
                cleanName = cleanName.match(extractRegex)[1];
            }

            let displayHtml = cleanName;
            
            // 2. Dynamically generate a 100% accurate Google Maps link
            if (cleanName !== "N/A" && !cleanName.includes("Ferry") && !cleanName.includes("Feribot")) {
                const islandEnglishName = i18n['EN'].islands[selectedIsland]; // Ensure search uses standard English island name
                const googleMapsQuery = encodeURIComponent(`${cleanName} restaurant ${islandEnglishName} Greece`);
                displayHtml = `<a href="https://www.google.com/maps/search/?api=1&query=${googleMapsQuery}" target="_blank" title="View on Google Maps">${cleanName}</a>`;
            }

            displayDiv.innerHTML = `
                <div class="rest-name">${displayHtml}</div>
                <div class="rest-desc">${restData.desc}</div>
            `;
            displayDiv.classList.remove('hidden');
        }

        function changeLanguage(lang) {
            currentLang = lang;
            
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-lang-${lang.toLowerCase()}`).classList.add('active');

            document.getElementById('app-title').textContent = i18n[lang].appTitle;
            document.getElementById('island-title').textContent = i18n[lang].islandTitle;
            document.getElementById('setup-title').textContent = i18n[lang].setupTitle;
            document.getElementById('btn-back').textContent = i18n[lang].backIsland;
            document.getElementById('btn-back-base').textContent = i18n[lang].backBase;

            document.getElementById('btn-chios').textContent = "🇬🇷 " + i18n[lang].islands.chios;
            document.getElementById('btn-kos').textContent = "🇬🇷 " + i18n[lang].islands.kos;
            document.getElementById('btn-lesbos').textContent = "🇬🇷 " + i18n[lang].islands.lesbos;
            document.getElementById('btn-meis').textContent = "🇬🇷 " + i18n[lang].islands.meis;
            document.getElementById('btn-rhodes').textContent = "🇬🇷 " + i18n[lang].islands.rhodes;
            document.getElementById('btn-samos').textContent = "🇬🇷 " + i18n[lang].islands.samos;

            if(document.getElementById('map-lbl-center')) {
                document.getElementById('map-lbl-center').textContent = i18n[lang].center;
                document.getElementById('map-lbl-north').textContent = i18n[lang].north;
                document.getElementById('map-lbl-south').textContent = i18n[lang].south;
                document.getElementById('map-lbl-east').textContent = i18n[lang].east;
                document.getElementById('map-lbl-west').textContent = i18n[lang].west;
            }

            if (!document.getElementById('itinerary-container').classList.contains('hidden')) {
                renderItinerary();
            }
        }
    </script>
</body>
</html>
